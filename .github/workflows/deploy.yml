name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: 922
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            export PATH="$HOME/.local/bin:$HOME/.local/share/pnpm/bin:$HOME/go/bin:$PATH"
            cd ~/schedule-optimizer

            # Pull latest changes
            echo "Pulling latest changes..."
            git fetch origin main
            git reset --hard origin/main

            # Run database migrations
            echo "Running migrations..."
            cd backend
            make migrate-up
            cd ..

            # Build frontend
            echo "Installing frontend dependencies..."
            cd frontend
            pnpm install --frozen-lockfile
            echo "Building frontend..."
            pnpm build
            cd ..

            # Build backend (frontend already compiled to backend/internal/static/dist)
            echo "Building Go binary..."
            cd backend
            CGO_ENABLED=1 go build -o bin/server ./cmd/server

            # Run tests
            echo "Running tests..."
            CGO_ENABLED=1 go test ./...
            cd ..

            # Restart service
            echo "Restarting service..."
            sudo systemctl restart schedule-optimizer

            echo "Deploy complete!"
